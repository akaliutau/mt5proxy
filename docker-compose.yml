services:
  mt5proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: mt5proxy:local
    container_name: mt5-proxy-scratch
    restart: unless-stopped
    env_file:
      - .env
    shm_size: "1gb"
    security_opt:
      - seccomp=unconfined
    ports:
      - "127.0.0.1:3000:6080"
      - "127.0.0.1:5900:5900"
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8001:8001"
    volumes:
      - mt5proxy_config:/config
      - mt5proxy_logs:/logs
    healthcheck:
      test: ["CMD", "/usr/local/bin/container_healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 5

volumes:
  mt5proxy_config:
  mt5proxy_logs:
