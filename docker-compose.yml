services:
  mt5proxy:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${BASE_IMAGE:-ubuntu:22.04}
        WINEHQ_PACKAGE: ${WINEHQ_PACKAGE:-winehq-staging}
        WINEHQ_DISTRO_CODENAME: ${WINEHQ_DISTRO_CODENAME:-}
    image: ${IMAGE_NAME:-mt5proxy:local}
    container_name: ${CONTAINER_NAME:-mt5-proxy}
    restart: unless-stopped
    shm_size: ${SHM_SIZE:-1gb}
    security_opt:
      - seccomp=unconfined
    env_file:
      - .env
    ports:
      - "127.0.0.1:${NOVNC_HOST_PORT:-3000}:6080"
      - "127.0.0.1:${VNC_HOST_PORT:-5900}:5900"
      - "127.0.0.1:${API_HOST_PORT:-8000}:8000"
      - "127.0.0.1:${BRIDGE_HOST_PORT:-8001}:8001"
    volumes:
      - mt5_config:/config
      - ./logs:/logs
    healthcheck:
      test: ["CMD", "/usr/local/bin/container_healthcheck.sh"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
    stop_grace_period: 60s

volumes:
  mt5_config:
